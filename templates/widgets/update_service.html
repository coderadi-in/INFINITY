<link rel="stylesheet" href="{{ url_for('static', filename='css/base/wizard.css') }}">

<section class="center w-full h-screen wizard-container" id="updateServiceWizard">
    <form action="" method="post" class="form column gap-20 p-20 rounded-16" id="updateServiceForm">
        <span class="link symbol" id="closeWizard">close</span>

        <div class="heading column">
            <h3 class="h3 uppercase">update service</h3>
            <p class="para">Update service details below and click save info.</p>
        </div>

        <div class="input-list column gap-12">
            <input type="hidden" name="client" value="{{ data.client.id }}">

            <div class="form-elem column gap-4">
                <label for="update_service_title">Title*</label>
                <input required type="text" name="title" id="update_service_title" class="input" placeholder="e.g.: Hosting">
            </div>

            <div class="form-elem column gap-4">
                <label for="update_service_category">Category*</label>
                <select required name="category" id="update_service_category" class="input">
                    <option value="" disabled>Select category</option>
                    <option value="recurring">Recurring</option>
                    <option value="one_time">One-time</option>
                </select>
            </div>

            <div class="form-elem column gap-4" id="update_service_billing_cycle_input">
                <label for="update_service_billing_cycle">Billing cycle</label>
                <select name="billing_cycle" id="update_service_billing_cycle" class="input">
                    <option value="">Select billing cycle</option>
                    <option value="monthly">Monthly</option>
                    <option value="quarterly">Quarterly</option>
                    <option value="half-yearly">Half yearly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>

            <div class="form-elem column gap-4">
                <label for="update_service_amount">Amount*</label>
                <input required type="number" name="amount" id="update_service_amount" class="input" placeholder="e.g.: 49.99" step="0.01" min="0">
            </div>
        </div>

        <button type="submit" class="btn fl p-12 rounded-16">
            <span class="mini uppercase">save info</span>
        </button>
    </form>
</section>

<script type="module" src="{{ url_for('static', filename='js/base/wizard.js') }}"></script>
