<link rel="stylesheet" href="{{ url_for('static', filename='css/base/wizard.css') }}">

<section class="center w-full h-screen wizard-container" id="managePaymentsWizard">
    <form action="" method="post" class="form column gap-20 p-20 rounded-16" id="updatePaymentForm">
        <span class="link symbol" id="closeWizard">close</span>

        <div class="heading column">
            <h3 class="h3 uppercase">update payment</h3>
            <p class="para">Update payment details below and click save info.</p>
        </div>

        <div class="input-list column gap-12">
            <input type="hidden" name="client" value="{{ data.client.id }}">

            <div class="form-elem column gap-4">
                <label for="update_payment_service_id">Service*</label>
                <select required name="service_id" id="update_payment_service_id" class="input">
                    {% for service in data.services %}
                    {% if not service.is_deleted %}
                    <option value="{{ service.id }}">{{ service.title }}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>

            <div class="form-elem column gap-4">
                <label for="update_payment_amount">Amount*</label>
                <input required type="number" name="amount" id="update_payment_amount" class="input" placeholder="e.g.: 699" step="0.01" min="0">
            </div>

            <div class="form-elem column gap-4">
                <label for="update_payment_paid_on">Paid on</label>
                <input type="date" name="paid_on" id="update_payment_paid_on" class="input">
            </div>

            <div class="form-elem column gap-4">
                <label for="update_payment_method">Method</label>
                <select name="method" id="update_payment_method" class="input">
                    <option value="upi">UPI</option>
                    <option value="bank">Bank transfer</option>
                    <option value="cash">Cash</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-elem column gap-4">
                <label for="update_payment_status">Status*</label>
                <select required name="status" id="update_payment_status" class="input">
                    <option value="paid">Paid</option>
                    <option value="pending">Pending</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn fl p-12 rounded-16">
            <span class="mini uppercase">save info</span>
        </button>
    </form>
</section>

<script type="module" src="{{ url_for('static', filename='js/base/wizard.js') }}"></script>
