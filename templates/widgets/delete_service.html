<link rel="stylesheet" href="{{ url_for('static', filename='css/base/wizard.css') }}">

<section class="center w-full h-screen wizard-container" id="deleteServiceWizard">
    <div class="form column gap-20 p-20 rounded-16">
        <span class="link symbol" id="closeWizard">close</span>

        <div class="heading column">
            <h3 class="h3 uppercase">delete service</h3>
            <p class="para">
                Are you sure you want to delete
                <strong id="deleteServiceTitleText">this service</strong>?
            </p>
        </div>

        <span class="mini">This action will archive the selected service and its related records.</span>

        <div class="row gap-12">
            <button type="button" class="btn p-12 rounded-16 w-full" id="cancelDeleteServiceBtn" style="background-color: var(--border);">
                <span class="mini uppercase">no</span>
            </button>

            <button type="button" class="btn fl p-12 rounded-16 w-full" id="confirmDeleteServiceBtn">
                <span class="mini uppercase">yes, delete</span>
            </button>
        </div>
    </div>
</section>

<script type="module" src="{{ url_for('static', filename='js/base/wizard.js') }}"></script>
